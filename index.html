<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discord Markdown Editor</title>
<link href="https://fonts.googleapis.com/css2?family=gg+sans:wght@400;500;600&family=Fira+Code:wght@400;500&family=Chakra+Petch:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #1e1f22;
    --bg-secondary: #2b2d31;
    --bg-tertiary: #313338;
    --bg-modifier: #232428;
    --surface: #383a40;
    --surface-hover: #404249;
    --brand: #5865f2;
    --brand-hover: #4752c4;
    --brand-active: #3c45a5;
    --green: #23a55a;
    --red: #f23f43;
    --yellow: #f0b232;
    --text-normal: #dbdee1;
    --text-muted: #80848e;
    --text-link: #00aff4;
    --header-primary: #f2f3f5;
    --interactive-normal: #b5bac1;
    --border: #3f4147;
    --nitro-grad: linear-gradient(135deg, #ff73fa, #5865f2);
    --scrollbar: #1a1b1e;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Chakra Petch', monospace;
    background: var(--bg-primary);
    color: var(--text-normal);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* === TOP BAR === */
  #topbar {
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px 0;
    display: flex;
    flex-direction: column;
    gap: 0;
    flex-shrink: 0;
    box-shadow: var(--shadow);
  }

  #topbar-row1 {
    display: flex;
    align-items: center;
    gap: 12px;
    padding-bottom: 10px;
    flex-wrap: wrap;
  }

  .app-logo {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-right: 8px;
  }

  .app-logo svg { width: 28px; height: 28px; }

  .app-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--header-primary);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .divider-v {
    width: 1px;
    height: 24px;
    background: var(--border);
    flex-shrink: 0;
  }

  /* Toolbar groups */
  .toolbar-group {
    display: flex;
    align-items: center;
    gap: 2px;
    background: var(--bg-modifier);
    border-radius: 6px;
    padding: 3px;
    border: 1px solid var(--border);
  }

  .toolbar-group .group-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    padding: 0 4px;
    font-weight: 600;
  }

  .btn {
    background: none;
    border: none;
    color: var(--interactive-normal);
    cursor: pointer;
    padding: 5px 8px;
    border-radius: 4px;
    font-size: 13px;
    font-family: 'Chakra Petch', monospace;
    font-weight: 500;
    transition: background 0.12s, color 0.12s;
    display: flex;
    align-items: center;
    gap: 4px;
    white-space: nowrap;
    min-width: 28px;
    justify-content: center;
    position: relative;
  }
  .btn:hover {
    background: var(--surface-hover);
    color: var(--header-primary);
  }
  .btn:active {
    background: var(--brand);
    color: #fff;
  }
  .btn.active {
    background: var(--brand);
    color: #fff;
  }
  .btn[title]:hover::after {
    content: attr(title);
    position: absolute;
    bottom: -28px;
    left: 50%;
    transform: translateX(-50%);
    background: #111;
    color: #fff;
    font-size: 11px;
    padding: 3px 7px;
    border-radius: 4px;
    white-space: nowrap;
    z-index: 999;
    pointer-events: none;
  }
  .btn.italic-btn { font-style: italic; }
  .btn.bold-btn { font-weight: 700; }
  .btn.underline-btn { text-decoration: underline; }
  .btn.strike-btn { text-decoration: line-through; }
  .btn.code-btn { font-family: 'Fira Code', monospace; font-size: 11px; }

  /* Plan selector row */
  #plan-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 0 10px;
    border-top: 1px solid var(--border);
    margin-top: 2px;
  }

  .plan-label {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    font-weight: 600;
  }

  .plan-btn {
    background: var(--bg-modifier);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 12px;
    font-family: 'Chakra Petch', monospace;
    font-weight: 600;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.04em;
  }
  .plan-btn:hover { border-color: var(--brand); color: var(--text-normal); }
  .plan-btn.selected-standard {
    background: var(--brand);
    border-color: var(--brand);
    color: #fff;
  }
  .plan-btn.selected-nitro {
    background: transparent;
    border: 1.5px solid transparent;
    background-clip: padding-box;
    position: relative;
    color: #fff;
  }
  .plan-btn.selected-nitro::before {
    content: '';
    position: absolute;
    inset: -1.5px;
    border-radius: 21px;
    background: var(--nitro-grad);
    z-index: -1;
  }

  .char-counter {
    margin-left: auto;
    font-size: 12px;
    color: var(--text-muted);
    font-family: 'Fira Code', monospace;
  }
  .char-counter .count { color: var(--text-normal); font-weight: 600; }
  .char-counter .over { color: var(--red); }
  .char-counter .limit-label { color: var(--text-muted); }

  /* === MAIN PANELS === */
  #panels {
    display: grid;
    grid-template-columns: 1fr 1fr;
    flex: 1;
    overflow: hidden;
    gap: 0;
  }

  .panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border-right: 1px solid var(--border);
  }
  .panel:last-child { border-right: none; }

  .panel-header {
    background: var(--bg-modifier);
    padding: 8px 16px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .panel-header .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot-edit { background: var(--yellow); }
  .dot-preview { background: var(--green); }
  .dot-output { background: var(--brand); }

  /* Editor */
  #editor {
    flex: 1;
    background: var(--bg-tertiary);
    border: none;
    outline: none;
    resize: none;
    color: var(--text-normal);
    font-family: 'Fira Code', monospace;
    font-size: 14px;
    line-height: 1.6;
    padding: 16px;
    caret-color: var(--brand);
    overflow-y: auto;
  }
  #editor::placeholder { color: var(--text-muted); }
  #editor::-webkit-scrollbar { width: 8px; }
  #editor::-webkit-scrollbar-track { background: var(--scrollbar); }
  #editor::-webkit-scrollbar-thumb { background: var(--surface); border-radius: 4px; }

  /* Preview (Discord rendering) */
  #preview-panel {
    background: var(--bg-tertiary);
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    font-family: 'gg sans', 'Noto Sans', 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 15px;
    line-height: 1.375;
    color: var(--text-normal);
  }
  #preview-panel::-webkit-scrollbar { width: 8px; }
  #preview-panel::-webkit-scrollbar-track { background: var(--scrollbar); }
  #preview-panel::-webkit-scrollbar-thumb { background: var(--surface); border-radius: 4px; }

  /* Discord markdown preview styles */
  #preview-panel strong { font-weight: 700; color: var(--header-primary); }
  #preview-panel em { font-style: italic; }
  #preview-panel u { text-decoration: underline; }
  #preview-panel s { text-decoration: line-through; }
  #preview-panel .spoiler {
    background: var(--surface);
    color: transparent;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.2s;
    padding: 0 2px;
  }
  #preview-panel .spoiler.revealed {
    color: var(--text-normal);
    background: var(--surface-hover);
  }
  #preview-panel h1 {
    font-size: 24px;
    font-weight: 700;
    color: var(--header-primary);
    margin: 8px 0 4px;
    line-height: 1.2;
    border-bottom: 1px solid var(--border);
    padding-bottom: 4px;
  }
  #preview-panel h2 {
    font-size: 20px;
    font-weight: 700;
    color: var(--header-primary);
    margin: 8px 0 4px;
    line-height: 1.2;
  }
  #preview-panel h3 {
    font-size: 16px;
    font-weight: 700;
    color: var(--header-primary);
    margin: 8px 0 4px;
    line-height: 1.2;
  }
  #preview-panel .subtext {
    font-size: 12px;
    color: var(--text-muted);
    margin: 2px 0;
  }
  #preview-panel blockquote {
    border-left: 4px solid var(--interactive-normal);
    padding-left: 12px;
    margin: 4px 0;
    color: var(--text-muted);
  }
  #preview-panel code {
    background: var(--bg-secondary);
    padding: 0 4px;
    border-radius: 3px;
    font-family: 'Fira Code', monospace;
    font-size: 13px;
    color: #e3e5e8;
  }
  #preview-panel pre {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px 14px;
    margin: 6px 0;
    overflow-x: auto;
    font-family: 'Fira Code', monospace;
    font-size: 13px;
    color: #e3e5e8;
    white-space: pre;
  }
  #preview-panel pre code { background: none; padding: 0; }
  #preview-panel ul, #preview-panel ol {
    padding-left: 24px;
    margin: 4px 0;
  }
  #preview-panel li { margin: 2px 0; }
  #preview-panel a { color: var(--text-link); text-decoration: none; }
  #preview-panel a:hover { text-decoration: underline; }
  #preview-panel p { margin: 2px 0; min-height: 1.375em; }

  /* === OUTPUT PANEL === */
  #output-wrapper {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    max-height: 220px;
  }

  #output-header {
    background: var(--bg-modifier);
    padding: 8px 16px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  #output-scroll {
    overflow-x: auto;
    overflow-y: auto;
    flex: 1;
    background: var(--bg-secondary);
    display: flex;
    gap: 10px;
    padding: 12px 16px;
  }
  #output-scroll::-webkit-scrollbar { height: 6px; width: 6px; }
  #output-scroll::-webkit-scrollbar-track { background: var(--scrollbar); }
  #output-scroll::-webkit-scrollbar-thumb { background: var(--surface); border-radius: 4px; }

  .output-chunk {
    flex-shrink: 0;
    width: 260px;
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    border-radius: 6px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: border-color 0.15s;
  }
  .output-chunk:hover { border-color: var(--brand); }

  .chunk-header {
    background: var(--bg-modifier);
    padding: 5px 10px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }

  .chunk-len {
    font-family: 'Fira Code', monospace;
    font-size: 10px;
  }
  .chunk-len.over { color: var(--red); }
  .chunk-len.ok { color: var(--green); }

  .chunk-text {
    padding: 8px 10px;
    font-family: 'Fira Code', monospace;
    font-size: 11px;
    line-height: 1.5;
    color: var(--text-normal);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: pre-wrap;
    word-break: break-word;
    flex: 1;
    max-height: 90px;
    overflow-y: auto;
  }

  .chunk-actions {
    padding: 5px 8px;
    display: flex;
    gap: 4px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .copy-btn {
    background: var(--brand);
    border: none;
    color: #fff;
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 11px;
    font-family: 'Chakra Petch', monospace;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.12s;
    flex: 1;
    letter-spacing: 0.04em;
  }
  .copy-btn:hover { background: var(--brand-hover); }
  .copy-btn.copied { background: var(--green); }

  /* Footer */
  #footer {
    background: var(--bg-secondary);
    border-top: 1px solid var(--border);
    padding: 5px 16px;
    font-size: 10px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
    letter-spacing: 0.04em;
  }
  #footer span { display: flex; align-items: center; gap: 4px; }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 2px 7px;
    border-radius: 10px;
  }
  .badge-nitro {
    background: var(--nitro-grad);
    color: #fff;
  }
  .badge-standard {
    background: var(--brand);
    color: #fff;
  }

  /* Segment warning badge */
  .seg-badge {
    display: inline-flex;
    align-items: center;
    background: var(--red);
    color: #fff;
    font-size: 9px;
    font-weight: 700;
    padding: 1px 5px;
    border-radius: 8px;
    margin-left: 4px;
  }

  /* === RESPONSIVE === */
  @media (max-width: 700px) {
    #panels { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
    #topbar-row1 { flex-wrap: wrap; }
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <div id="topbar-row1">
    <!-- Logo -->
    <div class="app-logo">
      <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M23.7 4.3C22 3.5 20.2 2.9 18.3 2.5c-.2.4-.5.9-.7 1.3A18 18 0 0 0 9.4 3.8c-.2-.4-.4-.9-.7-1.3C6.7 2.9 4.9 3.5 3.2 4.3 0 9.2-.9 14 .4 18.6c2.2 1.6 4.3 2.5 6.4 3.1.5-.7 1-1.4 1.4-2.2-.8-.3-1.5-.6-2.2-1l.5-.4c4.2 1.9 8.8 1.9 13 0l.5.4c-.7.4-1.5.8-2.2 1 .4.8.9 1.5 1.4 2.2 2.1-.6 4.2-1.5 6.4-3.1 1.5-5.3.4-9.9-2.4-14.3ZM9.4 15.9c-1.3 0-2.4-1.2-2.4-2.6s1.1-2.6 2.4-2.6c1.3 0 2.4 1.2 2.4 2.6s-1.1 2.6-2.4 2.6Zm9.2 0c-1.3 0-2.4-1.2-2.4-2.6s1.1-2.6 2.4-2.6c1.3 0 2.4 1.2 2.4 2.6s-1.1 2.6-2.4 2.6Z" fill="#5865F2"/>
      </svg>
      <span class="app-title">Discord MD Editor</span>
    </div>
    <div class="divider-v"></div>

    <!-- Text Formatting -->
    <div class="toolbar-group">
      <span class="group-label">Text</span>
      <button class="btn bold-btn" title="Bold (**text**)" onclick="wrapSelection('**','**')"><b>B</b></button>
      <button class="btn italic-btn" title="Italic (*text*)" onclick="wrapSelection('*','*')"><i>I</i></button>
      <button class="btn underline-btn" title="Underline (__text__)" onclick="wrapSelection('__','__')"><u>U</u></button>
      <button class="btn strike-btn" title="Strikethrough (~~text~~)" onclick="wrapSelection('~~','~~')"><s>S</s></button>
      <button class="btn" title="Spoiler (||text||)" onclick="wrapSelection('||','||')" style="font-size:11px;">👁</button>
    </div>

    <!-- Headers -->
    <div class="toolbar-group">
      <span class="group-label">Headers</span>
      <button class="btn" title="H1 Heading" onclick="insertLinePrefix('# ')">H1</button>
      <button class="btn" title="H2 Heading" onclick="insertLinePrefix('## ')">H2</button>
      <button class="btn" title="H3 Heading" onclick="insertLinePrefix('### ')">H3</button>
      <button class="btn" title="Subtext (-# text)" onclick="insertLinePrefix('-# ')" style="font-size:11px;">sub</button>
    </div>

    <!-- Lists & Quotes -->
    <div class="toolbar-group">
      <span class="group-label">Lists</span>
      <button class="btn" title="Unordered List (- item)" onclick="insertLinePrefix('- ')">• List</button>
      <button class="btn" title="Ordered List (1. item)" onclick="insertOrderedList()">1. List</button>
      <button class="btn" title="Blockquote (> text)" onclick="insertLinePrefix('> ')">❝</button>
      <button class="btn" title="Multi-line Blockquote (>>> text)" onclick="insertLinePrefix('>>> ')" style="font-size:10px;">❝❝</button>
    </div>

    <!-- Code -->
    <div class="toolbar-group">
      <span class="group-label">Code</span>
      <button class="btn code-btn" title="Inline Code (`text`)" onclick="wrapSelection('`','`')">`code`</button>
      <button class="btn code-btn" title="Code Block (```text```)" onclick="wrapCodeBlock()">```block```</button>
    </div>

    <!-- Link -->
    <div class="toolbar-group">
      <span class="group-label">Link</span>
      <button class="btn" title="Masked Link [Text](URL)" onclick="insertMaskedLink()">🔗 Link</button>
    </div>
  </div>

  <!-- Plan row -->
  <div id="plan-row">
    <span class="plan-label">Plan:</span>
    <button class="plan-btn selected-standard" id="btn-standard" onclick="setPlan('standard')">
      Standard Discord
    </button>
    <button class="plan-btn" id="btn-nitro" onclick="setPlan('nitro')">
      ✦ Discord Nitro
    </button>

    <div class="char-counter" id="char-counter">
      <span class="count" id="char-count">0</span>
      <span class="limit-label"> / </span>
      <span class="count" id="char-limit">2000</span>
      <span class="limit-label"> chars · </span>
      <span class="count" id="seg-count">1</span>
      <span class="limit-label"> segment(s)</span>
    </div>
  </div>
</div>

<!-- MAIN PANELS -->
<div id="panels">
  <!-- Left: Editor -->
  <div class="panel" style="border-right: 1px solid var(--border);">
    <div class="panel-header">
      <span class="dot dot-edit"></span>
      Markdown Editor
    </div>
    <textarea id="editor" spellcheck="true"
      placeholder="Start typing your Discord message here...&#10;&#10;Use the toolbar above to apply formatting, or type markdown syntax directly.&#10;&#10;Examples:&#10;**bold** *italic* __underline__ ~~strikethrough~~ ||spoiler||&#10;# Heading 1&#10;> Blockquote&#10;`inline code`"></textarea>
  </div>

  <!-- Right: Preview -->
  <div class="panel">
    <div class="panel-header">
      <span class="dot dot-preview"></span>
      Discord Preview
    </div>
    <div id="preview-panel"></div>
  </div>
</div>

<!-- OUTPUT PANEL -->
<div id="output-wrapper">
  <div id="output-header">
    <span class="dot dot-output"></span>
    Copy-Paste Output
    <span id="plan-badge" class="badge badge-standard">Standard · 2000 chars</span>
    <span id="over-warning" style="display:none; color: var(--red); font-size:10px; font-weight:700; margin-left:auto;">⚠ Word split — segments adjusted</span>
  </div>
  <div id="output-scroll"></div>
</div>

<!-- FOOTER -->
<div id="footer">
  <span>⌨ Type markdown or use toolbar</span>
  <span>|</span>
  <span>Click spoilers in preview to reveal</span>
  <span>|</span>
  <span>Segments break at word boundaries</span>
</div>

<script>
// ---- State ----
let plan = 'standard';
let charLimit = 2000;

const editor = document.getElementById('editor');
const previewPanel = document.getElementById('preview-panel');
const outputScroll = document.getElementById('output-scroll');
const charCountEl = document.getElementById('char-count');
const charLimitEl = document.getElementById('char-limit');
const segCountEl = document.getElementById('seg-count');
const planBadge = document.getElementById('plan-badge');
const overWarning = document.getElementById('over-warning');

// ---- Plan switching ----
function setPlan(p) {
  plan = p;
  charLimit = p === 'nitro' ? 4000 : 2000;
  charLimitEl.textContent = charLimit;

  document.getElementById('btn-standard').className = 'plan-btn' + (p === 'standard' ? ' selected-standard' : '');
  document.getElementById('btn-nitro').className = 'plan-btn' + (p === 'nitro' ? ' selected-nitro' : '');

  planBadge.className = 'badge ' + (p === 'nitro' ? 'badge-nitro' : 'badge-standard');
  planBadge.textContent = p === 'nitro' ? '✦ Nitro · 4000 chars' : 'Standard · 2000 chars';

  update();
}

// ---- Toolbar actions ----
function getEditorSelection() {
  const start = editor.selectionStart;
  const end = editor.selectionEnd;
  return { start, end, selected: editor.value.slice(start, end) };
}

function setEditorValue(val, cursorStart, cursorEnd) {
  editor.value = val;
  editor.focus();
  editor.setSelectionRange(cursorStart, cursorEnd);
  update();
}

function wrapSelection(before, after) {
  const { start, end, selected } = getEditorSelection();
  const val = editor.value;
  const newText = before + selected + after;
  const newVal = val.slice(0, start) + newText + val.slice(end);
  const newCursor = selected ? start + newText.length : start + before.length;
  setEditorValue(newVal, newCursor, selected ? newCursor : newCursor);
}

function insertLinePrefix(prefix) {
  const { start, end } = getEditorSelection();
  const val = editor.value;
  // Find start of line
  let lineStart = val.lastIndexOf('\n', start - 1) + 1;
  const newVal = val.slice(0, lineStart) + prefix + val.slice(lineStart);
  const offset = prefix.length;
  setEditorValue(newVal, start + offset, end + offset);
}

function insertOrderedList() {
  const { start } = getEditorSelection();
  const val = editor.value;
  let lineStart = val.lastIndexOf('\n', start - 1) + 1;
  // Count existing ordered items before this point
  const before = val.slice(0, lineStart);
  const lines = before.split('\n');
  let num = 1;
  for (let i = lines.length - 1; i >= 0; i--) {
    if (/^\d+\.\s/.test(lines[i])) { num = parseInt(lines[i]) + 1; break; }
    else if (lines[i].trim() !== '') break;
  }
  const prefix = num + '. ';
  const newVal = val.slice(0, lineStart) + prefix + val.slice(lineStart);
  setEditorValue(newVal, start + prefix.length, start + prefix.length);
}

function wrapCodeBlock() {
  const { start, end, selected } = getEditorSelection();
  const val = editor.value;
  const before = '```\n';
  const after = '\n```';
  const newVal = val.slice(0, start) + before + selected + after + val.slice(end);
  const newCursor = start + before.length + (selected ? selected.length + after.length : 0);
  setEditorValue(newVal, selected ? newCursor : start + before.length, selected ? newCursor : start + before.length);
}

function insertMaskedLink() {
  const { start, end, selected } = getEditorSelection();
  const val = editor.value;
  const linkText = selected || 'Link Text';
  const insert = `[${linkText}](https://url.here)`;
  const newVal = val.slice(0, start) + insert + val.slice(end);
  setEditorValue(newVal, start + insert.length, start + insert.length);
}

// ---- Discord Markdown Parser (preview) ----
function parseDiscordMarkdown(text) {
  // Escape HTML entities first
  const escape = s => s
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');

  const lines = text.split('\n');
  let html = '';
  let i = 0;

  while (i < lines.length) {
    const line = lines[i];
    const raw = line;

    // Multi-line blockquote >>>
    if (/^>>>\s?/.test(raw)) {
      let bq = raw.replace(/^>>>\s?/, '');
      i++;
      while (i < lines.length) { bq += '\n' + lines[i]; i++; }
      html += `<blockquote>${parseInline(bq)}</blockquote>`;
      continue;
    }
    // Code block
    if (/^```/.test(raw)) {
      let code = '';
      const lang = raw.slice(3).trim();
      i++;
      while (i < lines.length && !/^```/.test(lines[i])) {
        code += (code ? '\n' : '') + lines[i];
        i++;
      }
      i++; // skip closing ```
      html += `<pre><code>${escape(code)}</code></pre>`;
      continue;
    }
    // H1
    if (/^# /.test(raw)) { html += `<h1>${parseInline(raw.slice(2))}</h1>`; i++; continue; }
    // H2
    if (/^## /.test(raw)) { html += `<h2>${parseInline(raw.slice(3))}</h2>`; i++; continue; }
    // H3
    if (/^### /.test(raw)) { html += `<h3>${parseInline(raw.slice(4))}</h3>`; i++; continue; }
    // Subtext
    if (/^-# /.test(raw)) { html += `<p class="subtext">${parseInline(raw.slice(3))}</p>`; i++; continue; }
    // Single blockquote
    if (/^> /.test(raw)) { html += `<blockquote>${parseInline(raw.slice(2))}</blockquote>`; i++; continue; }
    // Unordered list
    if (/^[*-] /.test(raw)) {
      let items = '';
      while (i < lines.length && /^[*-] /.test(lines[i])) {
        items += `<li>${parseInline(lines[i].slice(2))}</li>`;
        i++;
      }
      html += `<ul>${items}</ul>`;
      continue;
    }
    // Ordered list
    if (/^\d+\. /.test(raw)) {
      let items = '';
      while (i < lines.length && /^\d+\. /.test(lines[i])) {
        items += `<li>${parseInline(lines[i].replace(/^\d+\. /, ''))}</li>`;
        i++;
      }
      html += `<ol>${items}</ol>`;
      continue;
    }
    // Empty line
    if (raw.trim() === '') { html += `<p></p>`; i++; continue; }
    // Regular paragraph
    html += `<p>${parseInline(raw)}</p>`;
    i++;
  }
  return html;
}

function parseInline(text) {
  const escape = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  let s = escape(text);

  // Masked links [text](url)
  s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_, t, u) => `<a href="${u}" target="_blank">${t}</a>`);
  // Inline code
  s = s.replace(/`([^`]+)`/g, (_, c) => `<code>${c}</code>`);
  // Bold+italic ***
  s = s.replace(/\*\*\*(.+?)\*\*\*/g, (_, t) => `<strong><em>${t}</em></strong>`);
  // Bold **
  s = s.replace(/\*\*(.+?)\*\*/g, (_, t) => `<strong>${t}</strong>`);
  // Underline __
  s = s.replace(/__(.+?)__/g, (_, t) => `<u>${t}</u>`);
  // Italic *
  s = s.replace(/\*([^*]+)\*/g, (_, t) => `<em>${t}</em>`);
  // Italic _
  s = s.replace(/_([^_]+)_/g, (_, t) => `<em>${t}</em>`);
  // Strikethrough ~~
  s = s.replace(/~~(.+?)~~/g, (_, t) => `<s>${t}</s>`);
  // Spoiler ||
  s = s.replace(/\|\|(.+?)\|\|/g, (_, t) => `<span class="spoiler" onclick="this.classList.toggle('revealed')">${t}</span>`);

  return s;
}

// ---- Segment splitting ----
function splitIntoSegments(text, limit) {
  if (!text) return [];
  if (text.length <= limit) return [text];

  const segments = [];
  let remaining = text;
  let splitWarning = false;

  while (remaining.length > limit) {
    let cutAt = limit;
    // Find last whitespace at or before limit
    const sub = remaining.slice(0, limit);
    const lastSpace = sub.search(/\s(?=\S*$)/);
    if (lastSpace > 0) {
      cutAt = lastSpace + 1; // cut after the whitespace
    } else {
      // No whitespace found — hard cut (rare)
      splitWarning = true;
    }
    // Trim trailing whitespace from chunk
    segments.push(remaining.slice(0, cutAt).trimEnd());
    remaining = remaining.slice(cutAt).trimStart();
  }
  if (remaining.length > 0) segments.push(remaining);
  return { segments, splitWarning };
}

// ---- Main update ----
function update() {
  const text = editor.value;
  const len = text.length;

  // Update counter
  charCountEl.textContent = len;
  charCountEl.className = len > charLimit ? 'count over' : 'count';

  // Render preview
  previewPanel.innerHTML = parseDiscordMarkdown(text);

  // Build output chunks
  const result = splitIntoSegments(text, charLimit);
  const segs = result.segments || result;
  const hasSplitWarning = result.splitWarning || false;

  segCountEl.textContent = segs.length;
  overWarning.style.display = hasSplitWarning ? 'inline' : 'none';

  outputScroll.innerHTML = '';
  segs.forEach((seg, idx) => {
    const chunk = document.createElement('div');
    chunk.className = 'output-chunk';

    const hdr = document.createElement('div');
    hdr.className = 'chunk-header';
    hdr.innerHTML = `<span>Segment ${idx + 1} of ${segs.length}</span><span class="chunk-len ${seg.length > charLimit ? 'over' : 'ok'}">${seg.length} / ${charLimit}</span>`;

    const txt = document.createElement('div');
    txt.className = 'chunk-text';
    txt.textContent = seg;

    const actions = document.createElement('div');
    actions.className = 'chunk-actions';

    const btn = document.createElement('button');
    btn.className = 'copy-btn';
    btn.textContent = `Copy Segment ${idx + 1}`;
    btn.onclick = () => {
      navigator.clipboard.writeText(seg).then(() => {
        btn.textContent = '✓ Copied!';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = `Copy Segment ${idx + 1}`;
          btn.classList.remove('copied');
        }, 1800);
      }).catch(() => {
        // Fallback
        const ta = document.createElement('textarea');
        ta.value = seg;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        btn.textContent = '✓ Copied!';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = `Copy Segment ${idx + 1}`;
          btn.classList.remove('copied');
        }, 1800);
      });
    };

    actions.appendChild(btn);
    chunk.appendChild(hdr);
    chunk.appendChild(txt);
    chunk.appendChild(actions);
    outputScroll.appendChild(chunk);
  });
}

// ---- Event listeners ----
editor.addEventListener('input', update);
editor.addEventListener('keydown', e => {
  // Tab inserts spaces
  if (e.key === 'Tab') {
    e.preventDefault();
    const { start, end } = getEditorSelection();
    const val = editor.value;
    const newVal = val.slice(0, start) + '  ' + val.slice(end);
    editor.value = newVal;
    editor.setSelectionRange(start + 2, start + 2);
    update();
  }
});

// Init
update();
</script>
